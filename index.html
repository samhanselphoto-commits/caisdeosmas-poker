function applySuitedRange() { applyRangePreset('suited'); }

// B.6: toggle grid ↔ preset view
function setRangeView(view) {
  STATE.rangeView = view;
  saveState();
  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  $('#rangePresetView').hidden = view !== 'preset';
  $('#rangeGridView').hidden = view !== 'grid';
  // Nếu đang ở preset view, sync activeRange với position hiện tại
  if (view === 'preset') {
    applyPositionRange();
  }
}

// B.5: áp dụng range preset theo vị trí hiện tại
function applyPositionRange() {
  pushHistory('range');
  STATE.activeRange = applyRangeFilter(STATE.position);
  updateRangeChips();
  saveState();
  scheduleCalc();
}

// B.5: render các preset chips (UTG, MP, ..., BB)
function renderRangePresetChips() {
  const wrap = $('#rangePresetChips');
  if (!wrap) return;
  wrap.innerHTML = '';
  Object.keys(RANGE_PRESETS_BY_POS).forEach(pos => {
    const preset = RANGE_PRESETS_BY_POS[pos];
    const btn = el('button', {
      class: 'chip range-preset-chip' + (pos === STATE.position ? ' active' : ''),
      'data-pos': pos,
      onclick: () => {
        STATE.position = pos;
        saveState();
        renderRangePresetChips();
        renderPositionChips();
        applyPositionRange();
      }
    }, [preset.label]);
    wrap.appendChild(btn);
  });
}

function updateRangeChips() {
  const count = Object.values(STATE.activeRange).filter(v => v).length;
  const pct = (count / 169) * 100;
  $('#rangeCount').textContent = `${count}/169 (${pct.toFixed(0)}%)`;
}

// B.4: position setters
function setPosition(pos) {
  if (!POS_LABELS[pos] || STATE.position === pos) return;
  pushHistory('position');
  STATE.position = pos;
  haptic(8);
  saveState();
  renderPositionChips();
  renderRangePresetChips();

  if (STATE.rangeView === 'preset') {

  pop.style.left = Math.max(8, Math.min(window.innerWidth - 320, r.left - 100)) + 'px';

// === UNDO/REDO (B.5) ===
const HISTORY_KEY = 'poker:history';
const HISTORY_MAX = 10;
let historyStack = []; // { snapshot, type }
let redoStack = [];

function snapshotState() {
  return {
    hero: STATE.hero.map(c => c ? { ...c } : null),
    board: STATE.board.map(c => c ? { ...c } : null),
    extraBoards: STATE.extraBoards.map(b => b.map(c => c ? { ...c } : null)),
    numOpps: STATE.numOpps,
    activeRange: { ...STATE.activeRange },
    pot: STATE.pot,
    call: STATE.call,
    precision: STATE.precision
  };
}
function pushHistory(type) {
  const snap = snapshotState();
  const last = historyStack[historyStack.length - 1];
  if (last && JSON.stringify(last.snapshot) === JSON.stringify(snap)) return; // no-op
  historyStack.push({ snapshot: snap, type });
  if (historyStack.length > HISTORY_MAX) historyStack.shift();
  redoStack = []; // clear redo on new action
  updateHistoryButtons();
}
function applySnapshot(snap) {
  STATE.hero = snap.hero.map(c => c ? { ...c } : null);
  STATE.board = snap.board.map(c => c ? { ...c } : null);
  STATE.extraBoards = snap.extraBoards.map(b => b.map(c => c ? { ...c } : null));
  STATE.numOpps = snap.numOpps;
  STATE.activeRange = { ...snap.activeRange };
  STATE.pot = snap.pot;
  STATE.call = snap.call;
  STATE.precision = snap.precision;
  STATE.trials = snap.precision === 'cao' ? 4000 : 2000;
  // Sync UI
  const potInput = $('#potValue'); if (potInput) potInput.value = STATE.pot;
  const callInput = $('#callValue'); if (callInput) callInput.value = STATE.call;
  document.querySelectorAll('.stepper-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.n) === STATE.numOpps);
  });
  document.querySelectorAll('[data-precision]').forEach(b => {
    b.classList.toggle('active', b.dataset.precision === STATE.precision);
  });
  saveState();
  render();
  scheduleCalc();
}
function undo() {
  if (historyStack.length === 0) return;
  const cur = snapshotState();
  const item = historyStack.pop();
  redoStack.push({ snapshot: cur, type: item.type });
  applySnapshot(item.snapshot);
  updateHistoryButtons();
  haptic(8);
}
function redo() {
  if (redoStack.length === 0) return;
  const cur = snapshotState();
  const item = redoStack.pop();
  historyStack.push({ snapshot: cur, type: item.type });
  applySnapshot(item.snapshot);
  updateHistoryButtons();
  haptic(8);
}
function updateHistoryButtons() {
  const u = $('#btnUndo'), r = $('#btnRedo');
  if (u) u.disabled = historyStack.length === 0;
  if (r) r.disabled = redoStack.length === 0;
}
// Snapshot user commits: tap card, change range, change pot/call on blur, change numOpps, change precision
// Các setter hiện tại: gọi pushHistory() ở đầu, saveState() ở cuối.
// Tránh push mỗi oninput pot/call (gõ 1 ký tự = 1 history), nên push trên blur/change.


function shareEquity() {
  const hero = STATE.hero.filter(c => c);
  if (hero.length < 2) {
    showToast('Chọn bài trước khi chia sẻ');
    return;
  }
  const board = STATE.board.filter(c => c);
  const eq = STATE.equity;
  const lines = [];
  lines.push('🃏 CaisDeosMasPoker');
  lines.push(`Bài tôi: ${hero.map(c => `${RANK_DISPLAY[c.rank]}${SUIT_SYMBOLS[SUITS[c.suit]]}`).join(' ')}`);
  if (board.length) lines.push(`Bài chung: ${board.map(c => `${RANK_DISPLAY[c.rank]}${SUIT_SYMBOLS[SUITS[c.suit]]}`).join(' ')}`);
  if (STATE.extraBoards.some(b => b.some(c => c))) {
    const extras = STATE.extraBoards.filter(b => b.some(c => c));
    extras.forEach((b, i) => {
      const cards = b.filter(c => c).map(c => `${RANK_DISPLAY[c.rank]}${SUIT_SYMBOLS[SUITS[c.suit]]}`).join(' ');
      lines.push(`Bộ thử ${i+1}: ${cards}`);
    });
  }
  if (eq) {
    lines.push(`Đối thủ: ${STATE.numOpps}`);
    lines.push(`Equity: ${(eq.equity * 100).toFixed(1)}%  (Thắng ${(eq.win*100).toFixed(0)}% / Hòa ${(eq.tie*100).toFixed(0)}% / Thua ${(eq.lose*100).toFixed(0)}%)`);
    if (STATE.pot || STATE.call) {
      const req = STATE.call / (STATE.pot + STATE.call);
      lines.push(`Pot: ${STATE.pot}  Call: ${STATE.call}  Cần: ${(req * 100).toFixed(0)}%`);
    }
    const action = $('#recAction')?.textContent;
    if (action && action !== '—') lines.push(`Đề xuất: ${action}`);
  }
  const text = lines.join('\n');
  // Try Clipboard API; fallback to execCommand
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('Đã copy vào clipboard')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
  haptic(15);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('Đã copy'); } catch (e) { showToast(text); }
  document.body.removeChild(ta);
}
function showToast(msg) {
  let t = $('#toast');
  if (!t) {
    t = el('div', { id: 'toast', class: 'toast' });
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
